<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000510">
<title>XEROZ — AI World</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #000510;
  --panel:   #010d1f;
  --glass:   rgba(0,200,255,0.04);
  --border:  rgba(0,200,255,0.15);
  --border2: rgba(0,200,255,0.07);
  --cyan:    #00c8ff;
  --cyan2:   #00ffea;
  --magenta: #ff00c8;
  --green:   #00ff9d;
  --text:    #c8e8ff;
  --muted:   #2a4a6a;
  --danger:  #ff4466;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Exo 2',sans-serif; font-weight:300; }

/* SCANLINES */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
}

/* CANVAS */
#bgc { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* APP SHELL */
.app { position:relative; z-index:2; display:flex; flex-direction:column; height:100vh; }

/* HEADER */
.hdr {
  background:rgba(0,5,16,0.97); border-bottom:1px solid var(--border2);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:56px; flex-shrink:0; position:relative; overflow:hidden;
}
.hdr::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--magenta),var(--cyan),transparent);
  background-size:200%; animation:flow 4s linear infinite;
}
@keyframes flow { 0%{background-position:0%} 100%{background-position:200%} }

.logo { display:flex; align-items:center; gap:10px; }
.logo-hex {
  width:32px; height:32px; border:1px solid var(--cyan); border-radius:6px;
  display:flex; align-items:center; justify-content:center; font-size:1rem;
  box-shadow:0 0 10px rgba(0,200,255,0.25); animation:hexPulse 3s ease-in-out infinite;
}
@keyframes hexPulse { 0%,100%{box-shadow:0 0 10px rgba(0,200,255,0.25)} 50%{box-shadow:0 0 22px rgba(0,200,255,0.5)} }
.logo-name {
  font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.3rem; letter-spacing:5px;
  background:linear-gradient(90deg,var(--cyan),var(--cyan2),var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  background-size:200%; animation:shimmer 3s linear infinite;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

.online {
  font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--green);
  display:flex; align-items:center; gap:5px; letter-spacing:1px;
}
.dot { width:6px; height:6px; background:var(--green); border-radius:50%; box-shadow:0 0 5px var(--green); animation:blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* MESSAGES */
.msgs {
  flex:1; overflow-y:auto; padding:16px; display:flex;
  flex-direction:column; gap:14px; scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar { width:2px; }
.msgs::-webkit-scrollbar-thumb { background:rgba(0,200,255,0.15); }

/* WELCOME */
.welcome {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; text-align:center; padding:24px;
  animation:fadeUp 1s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.w-orb {
  width:76px; height:76px; border-radius:50%; border:1px solid var(--cyan);
  display:flex; align-items:center; justify-content:center; font-size:2rem;
  position:relative; animation:orbFloat 4s ease-in-out infinite;
  box-shadow:0 0 28px rgba(0,200,255,0.25),inset 0 0 28px rgba(0,200,255,0.04);
}
.w-orb::before, .w-orb::after {
  content:''; position:absolute; border-radius:50%; border:1px solid rgba(0,200,255,0.12);
}
.w-orb::before { inset:-12px; animation:spin 4s linear infinite; }
.w-orb::after  { inset:-22px; animation:spin 7s linear infinite reverse; }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes orbFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.w-title {
  font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:700;
  letter-spacing:4px; color:var(--cyan); text-shadow:0 0 16px rgba(0,200,255,0.4);
}
.w-sub { font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--muted); letter-spacing:2px; line-height:1.9; }
.chips { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:4px; }
.chip {
  padding:6px 13px; border:1px solid rgba(0,200,255,0.18); border-radius:2px;
  background:var(--glass); color:rgba(0,200,255,0.6);
  font-family:'Share Tech Mono',monospace; font-size:0.58rem; letter-spacing:1px;
  cursor:pointer; transition:all 0.2s;
}
.chip:hover, .chip:active { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 8px rgba(0,200,255,0.12); }

/* BUBBLES */
.msg { display:flex; gap:10px; animation:msgIn 0.3s ease; }
.msg.user { flex-direction:row-reverse; animation-name:msgInR; }
@keyframes msgIn  { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
@keyframes msgInR { from{opacity:0;transform:translateX(6px)}  to{opacity:1;transform:translateX(0)} }

.av {
  width:30px; height:30px; border-radius:4px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:0.85rem; align-self:flex-end;
  font-family:'Share Tech Mono',monospace;
}
.msg.ai   .av { background:rgba(0,200,255,0.07); border:1px solid rgba(0,200,255,0.25); color:var(--cyan); }
.msg.user .av { background:rgba(255,0,200,0.05); border:1px solid rgba(255,0,200,0.18); color:var(--magenta); }

.mbody { max-width:80%; }
.mlabel { font-family:'Share Tech Mono',monospace; font-size:0.5rem; letter-spacing:2px; margin-bottom:4px; padding:0 3px; }
.msg.ai   .mlabel { color:var(--cyan); opacity:0.5; }
.msg.user .mlabel { color:var(--magenta); opacity:0.5; text-align:right; }
.msg.user .mbody  { display:flex; flex-direction:column; align-items:flex-end; }

.bubble { padding:10px 13px; font-size:0.87rem; line-height:1.7; word-break:break-word; position:relative; }
.msg.ai .bubble {
  background:rgba(0,200,255,0.025); border:1px solid rgba(0,200,255,0.1);
  border-radius:2px 10px 10px 10px; color:var(--text);
}
.msg.ai .bubble::before {
  content:''; position:absolute; top:0; left:0; width:2px; height:100%;
  background:linear-gradient(180deg,var(--cyan),transparent); border-radius:2px;
}
.msg.user .bubble {
  background:rgba(255,0,200,0.03); border:1px solid rgba(255,0,200,0.12);
  border-radius:10px 2px 10px 10px; color:var(--text);
}
.mtime { font-family:'Share Tech Mono',monospace; font-size:0.5rem; color:var(--muted); margin-top:4px; padding:0 3px; }
.msg.user .mtime { text-align:right; }

/* TYPING */
.typing { display:flex; gap:10px; animation:msgIn 0.3s ease; }
.tbubble {
  padding:12px 16px; background:rgba(0,200,255,0.025);
  border:1px solid rgba(0,200,255,0.1); border-radius:2px 10px 10px 10px;
  display:flex; gap:5px; align-items:center;
}
.td { width:6px; height:6px; border-radius:50%; background:var(--cyan); opacity:0.3; animation:td 1.2s ease-in-out infinite; }
.td:nth-child(2){animation-delay:0.2s} .td:nth-child(3){animation-delay:0.4s}
@keyframes td { 0%,60%,100%{opacity:0.2;transform:scale(0.8)} 30%{opacity:1;transform:scale(1)} }

/* INPUT */
.inp-zone {
  padding:10px 14px 18px; border-top:1px solid var(--border2);
  background:rgba(0,5,16,0.97); flex-shrink:0; position:relative;
}
.inp-zone::before {
  content:''; position:absolute; top:0; left:8%; right:8%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,200,255,0.2),transparent);
}
.inp-frame {
  display:flex; gap:8px; align-items:flex-end;
  border:1px solid rgba(0,200,255,0.18); border-radius:4px;
  padding:9px 12px; background:rgba(0,200,255,0.015);
  transition:border-color 0.2s, box-shadow 0.2s;
}
.inp-frame:focus-within { border-color:rgba(0,200,255,0.45); box-shadow:0 0 14px rgba(0,200,255,0.07); }
.inp-pre { font-family:'Share Tech Mono',monospace; font-size:0.78rem; color:rgba(0,200,255,0.4); flex-shrink:0; align-self:center; }
.inp {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'Exo 2',sans-serif; font-size:0.9rem;
  font-weight:300; resize:none; max-height:110px; line-height:1.5;
}
.inp::placeholder { color:var(--muted); font-size:0.8rem; }
.sbtn {
  width:36px; height:36px; border-radius:4px; background:transparent;
  border:1px solid rgba(0,200,255,0.25); color:var(--cyan); font-size:1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
.sbtn:hover { background:rgba(0,200,255,0.08); border-color:var(--cyan); }
.sbtn:disabled { opacity:0.2; cursor:not-allowed; }
.sbtn:active { transform:scale(0.93); }
.inp-foot { display:flex; justify-content:space-between; margin-top:6px; padding:0 2px; }
.hint { font-family:'Share Tech Mono',monospace; font-size:0.5rem; color:var(--muted); letter-spacing:0.5px; }
.mem-on { font-family:'Share Tech Mono',monospace; font-size:0.5rem; color:var(--green); display:flex; align-items:center; gap:4px; }
.mem-on::before { content:''; width:5px; height:5px; background:var(--green); border-radius:50%; animation:blink 2s ease-in-out infinite; }
</style>
</head>
<body>

<canvas id="bgc"></canvas>

<div class="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="logo">
      <div class="logo-hex">⬡</div>
      <div>
        <div class="logo-name">XEROZ</div>
      </div>
    </div>
    <div class="online"><span class="dot"></span>ONLINE</div>
  </header>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="w-orb">⬡</div>
      <div class="w-title">XEROZ ONLINE</div>
      <div class="w-sub">NEURAL INTERFACE READY<br>YOUR PERSONAL AI<br>ENTER COMMAND</div>
      <div class="chips">
        <div class="chip" onclick="tip('My name is ')">ENCODE NAME</div>
        <div class="chip" onclick="tip('What can you do?')">CAPABILITIES</div>
        <div class="chip" onclick="tip('I am building WorldPulse. Remember this.')">LOG PROJECT</div>
        <div class="chip" onclick="tip('What do you know about me?')">RECALL DATA</div>
        <div class="chip" onclick="tip('Teach me about AI')">LEARN AI</div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="inp-zone">
    <div class="inp-frame">
      <span class="inp-pre">&gt;_</span>
      <textarea class="inp" id="inp" placeholder="transmit to XEROZ..." rows="1"
        onkeydown="onKey(event)" oninput="grow(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="send()">⟶</button>
    </div>
    <div class="inp-foot">
      <span class="hint">ENTER → SEND · SHIFT+ENTER → NEW LINE</span>
      <span class="mem-on">MEMORY ACTIVE</span>
    </div>
  </div>

</div>

<script>

// ════════════════════════════════════════
// STEP 1: PASTE YOUR GEMINI API KEY BELOW
// Get free key → aistudio.google.com
// ════════════════════════════════════════
const API_KEY = 'AIzaSyBk_gaDaE5vRqa1eD1_bYsG8Q5Na4_vNVY';


// ════════════════════════════════════════
// DO NOT EDIT BELOW THIS LINE
// ════════════════════════════════════════

const MODEL = 'gemini-2.0-flash-lite';

// PARTICLE BACKGROUND
const C = document.getElementById('bgc');
const X = C.getContext('2d');
let W = C.width  = innerWidth;
let H = C.height = innerHeight;
window.addEventListener('resize', () => { W = C.width = innerWidth; H = C.height = innerHeight; });

const P = Array.from({length:60}, () => ({
  x: Math.random() * innerWidth,
  y: Math.random() * innerHeight,
  vx: (Math.random() - 0.5) * 0.25,
  vy: (Math.random() - 0.5) * 0.25,
  r:  Math.random() * 1.2 + 0.4,
  a:  Math.random() * 0.3 + 0.08
}));

(function loop() {
  X.clearRect(0, 0, W, H);
  // Grid
  X.strokeStyle = 'rgba(0,200,255,0.025)';
  X.lineWidth = 1;
  for(let x = 0; x < W; x += 60) { X.beginPath(); X.moveTo(x,0); X.lineTo(x,H); X.stroke(); }
  for(let y = 0; y < H; y += 60) { X.beginPath(); X.moveTo(0,y); X.lineTo(W,y); X.stroke(); }
  // Particles
  P.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0) p.x = W; if(p.x > W) p.x = 0;
    if(p.y < 0) p.y = H; if(p.y > H) p.y = 0;
    X.beginPath(); X.arc(p.x, p.y, p.r, 0, Math.PI*2);
    X.fillStyle = `rgba(0,200,255,${p.a})`; X.fill();
    for(let j = i+1; j < P.length; j++) {
      const q = P[j], d = Math.hypot(p.x-q.x, p.y-q.y);
      if(d < 90) {
        X.beginPath(); X.moveTo(p.x,p.y); X.lineTo(q.x,q.y);
        X.strokeStyle = `rgba(0,200,255,${0.05*(1-d/90)})`; X.lineWidth=0.5; X.stroke();
      }
    }
  });
  requestAnimationFrame(loop);
})();

// MEMORY
let mems = JSON.parse(localStorage.getItem('xeroz_mem') || '[]');
let msgs = [];
let busy = false;

function buildSystem() {
  let s = `You are XEROZ — a highly intelligent, personal AI assistant. You are sharp, direct, and slightly futuristic. You are exclusively this user's personal AI.

Rules:
- Be helpful, concise, and smart
- Reference the user's memories naturally
- Never say "As an AI" — you ARE XEROZ
- Today: ${new Date().toDateString()}`;

  if(mems.length) {
    s += `\n\n[ YOUR MEMORY OF THIS USER ]\n`;
    mems.forEach(m => s += `• ${m.k}: ${m.v}\n`);
  }
  return s;
}

function autoMem(msg) {
  const nm = msg.match(/my name is ([A-Za-z]+)/i);
  if(nm && !mems.find(m => m.k.toLowerCase() === 'name')) {
    mems.push({k:'Name', v:nm[1]});
    localStorage.setItem('xeroz_mem', JSON.stringify(mems));
  }
}

// CHAT UI
function bubble(role, text) {
  const w = document.getElementById('welcome');
  if(w) w.remove();
  const el = document.getElementById('msgs');
  const t  = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const d  = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `
    <div class="av">${role === 'ai' ? '⬡' : '◈'}</div>
    <div class="mbody">
      <div class="mlabel">${role === 'ai' ? 'XEROZ' : 'YOU'}</div>
      <div class="bubble">${text.replace(/\n/g,'<br>')}</div>
      <div class="mtime">${t}</div>
    </div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const el = document.getElementById('msgs');
  const d  = document.createElement('div');
  d.id = 'typ'; d.className = 'typing';
  d.innerHTML = `
    <div class="av" style="background:rgba(0,200,255,0.07);border:1px solid rgba(0,200,255,0.25);color:#00c8ff;border-radius:4px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;">⬡</div>
    <div class="tbubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typ'); if(t) t.remove(); }

// SEND MESSAGE
async function send() {
  const inp  = document.getElementById('inp');
  const text = inp.value.trim();
  if(!text || busy) return;

  inp.value = ''; inp.style.height = 'auto';
  busy = true;
  document.getElementById('sbtn').disabled = true;

  bubble('user', text);
  msgs.push({role:'user', content: text});
  autoMem(text);
  showTyping();

  try {
    // Build Gemini format
    const history = [];

    // System prompt as first exchange
    history.push({role:'user',   parts:[{text: buildSystem()}]});
    history.push({role:'model',  parts:[{text: 'Understood. I am XEROZ, your personal AI. Ready.'}]});

    // Add conversation history
    msgs.slice(-18).forEach(m => {
      history.push({
        role:  m.role === 'assistant' ? 'model' : 'user',
        parts: [{text: m.content}]
      });
    });

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({contents: history})
      }
    );

    const data  = await res.json();

    if(data.error) {
      throw new Error(data.error.message);
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'NO RESPONSE RECEIVED.';

    removeTyping();
    bubble('ai', reply);
    msgs.push({role:'assistant', content: reply});

  } catch(err) {
    removeTyping();
    bubble('ai', 'ERROR: ' + (err.message || 'Check your API key at aistudio.google.com'));
  }

  busy = false;
  document.getElementById('sbtn').disabled = false;
  document.getElementById('inp').focus();
}

function tip(t)  { document.getElementById('inp').value = t; document.getElementById('inp').focus(); }
function onKey(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); } }
function grow(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }

</script>
</body>
</html>
